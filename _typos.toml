[default.extend-words]
# Nix ecosystem terms
nix = "nix"
hm = "hm"
ags = "ags"
# LaTeX packages/options (vscode settings)
acn = "acn"
ist = "ist"
ot = "ot"
braket = "braket"
# Docs: bold-initial patterns like **D**EAD, **B**uffer
DED = "DED"
uffer = "uffer"
earch = "earch"
