name: Lint
on:
  push:
    branches: [master]
  pull_request:
jobs:
  nix-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: cachix/cachix-action@v16
        with:
          name: anko9801
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check flake health
        uses: DeterminateSystems/flake-checker-action@main
      - name: Create dummy nix-windows input
        run: |
          mkdir -p /tmp/nix-windows-dummy
          cat > /tmp/nix-windows-dummy/flake.nix << 'NIX'
          {
            description = "Dummy nix-windows for CI";
            inputs.nixpkgs.url = "github:nixos/nixpkgs/nixos-unstable";
            outputs = { self, nixpkgs }: {
              lib.mkNixWindows = _: nixpkgs.legacyPackages.x86_64-linux.emptyDirectory;
              nixWindowsModules.default = [];
            };
          }
          NIX
          cd /tmp/nix-windows-dummy && git init && git add . && git commit -m "init"
      - name: Check Nix flake
        # --impure: required for builtins.getEnv "USER" in flake.nix
        run: nix flake check --impure --override-input nix-windows path:/tmp/nix-windows-dummy
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
      - name: Format check (treefmt)
        run: nix fmt -- --fail-on-change
      - name: Lint check (statix)
        run: nix shell nixpkgs#statix -c statix check .
      - name: Dead code check (deadnix)
        run: nix shell nixpkgs#deadnix -c deadnix --fail .
