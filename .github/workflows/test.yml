name: Build
on:
  push:
    branches: [master]
    paths:
      - '**.nix'
      - 'flake.lock'
      - '.github/workflows/test.yml'
      - '.github/scripts/benchmark.sh'
  pull_request:
    paths:
      - '**.nix'
      - 'flake.lock'
      - '.github/workflows/test.yml'
      - '.github/scripts/benchmark.sh'
permissions:
  contents: write
  actions: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-home:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        host: [linux-desktop]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-home-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-home-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-home-
          purge-last-accessed: 604800
      - uses: cachix/cachix-action@v16
        with:
          name: anko9801
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build Home Manager configuration (${{ matrix.host }})
        run: python3 .github/scripts/nix-build-trace.py record -- nix build .#homeConfigurations.${{ matrix.host }}.activationPackage --impure
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
      - name: Generate build trace
        if: always()
        run: python3 .github/scripts/nix-build-trace.py convert /tmp/build.jsonl -o /tmp/build-trace-${{ matrix.host }}.json
      - name: Upload build trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-trace-home-${{ matrix.host }}
          path: /tmp/build-trace-${{ matrix.host }}.json
  activate-home:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-home
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-activate-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-activate-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-activate-
          purge-last-accessed: 604800
      - uses: cachix/cachix-action@v16
        with:
          name: anko9801
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Setup dbus
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus dbus-x11
          sudo mkdir -p /run/dbus
          sudo dbus-daemon --system --fork
      - name: Build Home Manager configuration
        run: nix build .#homeConfigurations.linux-desktop.activationPackage --impure
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
      - name: Activate Home Manager
        run: |
          eval $(dbus-launch --sh-syntax)
          # Remove conflicting files from runner's home
          rm -f ~/.bash_profile ~/.bashrc ~/.profile ~/.config/nix/nix.conf
          ./result/activate
          echo "$HOME/.nix-profile/bin" >> $GITHUB_PATH
      # Benchmark
      - name: Restore benchmark baseline
        uses: actions/cache/restore@v4
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-
          restore-keys: ${{ runner.os }}-benchmark-
      - name: Run benchmark
        run: .github/scripts/benchmark.sh
      - name: Upload benchmark
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: /tmp/result-benchmark.json
          external-data-json-path: ./cache/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-always: true
          comment-on-alert: true
          alert-comment-cc-users: "@${{ github.repository_owner }}"
          fail-on-alert: false
          alert-threshold: "150%"
      - name: Save benchmark baseline
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-${{ github.run_id }}
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: benchmark
          path: ./cache
      - uses: Kesin11/actions-timeline@v2
        if: always()
  build-nixos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        host: [nixos-desktop]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-nixos-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-nixos-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-nixos-
          purge-last-accessed: 604800
      - uses: cachix/cachix-action@v16
        with:
          name: anko9801
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build NixOS configuration (${{ matrix.host }})
        run: python3 .github/scripts/nix-build-trace.py record -- nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --impure
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
      - name: Generate build trace
        if: always()
        run: python3 .github/scripts/nix-build-trace.py convert /tmp/build.jsonl -o /tmp/build-trace-${{ matrix.host }}.json
      - name: Upload build trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-trace-nixos-${{ matrix.host }}
          path: /tmp/build-trace-${{ matrix.host }}.json
      - uses: Kesin11/actions-timeline@v2
        if: always()
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-darwin-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-darwin-
          gc-max-store-size-macos: 2G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-darwin-
          purge-last-accessed: 604800
      - uses: cachix/cachix-action@v16
        with:
          name: anko9801
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build nix-darwin configuration
        run: python3 .github/scripts/nix-build-trace.py record -- nix build .#darwinConfigurations.mac-arm.system --impure
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
      - name: Generate build trace
        if: always()
        run: python3 .github/scripts/nix-build-trace.py convert /tmp/build.jsonl -o /tmp/build-trace-mac-arm.json
      - name: Upload build trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-trace-darwin-mac-arm
          path: /tmp/build-trace-mac-arm.json
      - uses: Kesin11/actions-timeline@v2
        if: always()
